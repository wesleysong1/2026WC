<script>
  function showFatal(title, detail) {
    var r = document.getElementById("root");
    if (!r) return;
    if (r.getAttribute("data-rendered") === "1") return;
    r.innerHTML =
      '<div style="max-width:640px;margin:60px auto;padding:24px;font-family:system-ui,sans-serif;' +
      'background:#1a0d0d;border:1px solid #5a2a2a;border-radius:14px;color:#ffd7d7;line-height:1.6">' +
      '<div style="font-size:18px;font-weight:800;margin-bottom:10px;color:#ff8a8a">⚠️ ' + title + '</div>' +
      '<div style="font-size:13px;color:#e6b8b8;white-space:pre-wrap">' + (detail || "") + '</div>' +
      '<div style="font-size:12px;color:#a88;margin-top:14px">새로고침해도 같은 화면이면, 위 메시지를 캡처해 알려주세요.</div>' +
      '</div>';
  }
  window.addEventListener("error", function (e) {
    showFatal("스크립트 오류가 발생했습니다", (e && e.message ? e.message : "") + (e && e.filename ? "\n(" + e.filename + ")" : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showFatal("처리되지 않은 오류", e && e.reason ? String(e.reason) : "");
  });
  window.addEventListener("load", function () {
    setTimeout(function () {
      var r = document.getElementById("root");
      if (r && r.getAttribute("data-rendered") === "1") return;
      var missing = [];
      if (typeof React === "undefined") missing.push("React");
      if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
      if (typeof Babel === "undefined") missing.push("Babel");
      if (typeof XLSX === "undefined") missing.push("SheetJS(XLSX)");
      if (typeof supabase === "undefined") missing.push("Supabase");
      if (missing.length) {
        showFatal("필수 라이브러리를 불러오지 못했습니다",
          "불러오기 실패: " + missing.join(", ") +
          "\n\n학교/기관 네트워크가 cdn.jsdelivr.net 접속을 차단하면 발생할 수 있습니다. 다른 네트워크(휴대폰 테더링 등)에서 다시 시도하거나 관리자에게 차단 해제를 요청하세요.");
      } else {
        showFatal("화면을 그리지 못했습니다", "라이브러리는 로드됐으나 렌더링이 완료되지 않았습니다. 콘솔(F12)의 오류 메시지를 확인해 주세요.");
      }
    }, 5000);
  });
</script>

const toApp = (r) => r ? { studentId: r.student_id, name: r.name, scoreKr: r.score_kr, scoreSa: r.score_sa, outcome: r.outcome, scorer: r.scorer, submittedAt: r.submitted_at } : null;
const toDb = (e) => ({ student_id: e.studentId, name: e.name, score_kr: e.scoreKr, score_sa: e.scoreSa, outcome: e.outcome, scorer: e.scorer, submitted_at: e.submittedAt });
const lsKey = (id, name) => LS_PREFIX + id + "|" + name;
const store = {
  async getEntry(id, name) {
    if (sb) {
      const { data, error } = await sb.from(TABLE).select("*").eq("student_id", id).eq("name", name).limit(1);
      if (error) throw error;
      return (data && data.length) ? toApp(data[0]) : null;
    }
    const v = localStorage.getItem(lsKey(id, name)); return v ? JSON.parse(v) : null;
  },
  async setEntry(data) {
    if (sb) {
      const { error } = await sb.from(TABLE).insert(toDb(data));
      if (error) throw error;
      return;
    }
    localStorage.setItem(lsKey(data.studentId, data.name), JSON.stringify(data));
  },
  async listEntries() {
    if (sb) {
      const { data, error } = await sb.from(TABLE).select("*").order("student_id", { ascending: true });
      if (error) throw error;
      return (data || []).map(toApp);
    }
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS_PREFIX)) { try { out.push(JSON.parse(localStorage.getItem(k))); } catch (e) {} }
    }
    return out;
  },
  async getAnswer() {
    if (sb) {
      const { data, error } = await sb.from("answer_key").select("*").eq("id", "main").limit(1);
      if (error) throw error;
      if (!data || !data.length) return null;
      const r = data[0];
      return { scoreKr: r.score_kr, scoreSa: r.score_sa, scorer: r.scorer };
    }
    const v = localStorage.getItem("wc2026a3_answer"); return v ? JSON.parse(v) : null;
  },
  async setAnswer(ans) {
    if (sb) {
      const { error } = await sb.from("answer_key").upsert({ id: "main", score_kr: ans.scoreKr, score_sa: ans.scoreSa, scorer: ans.scorer, updated_at: new Date().toISOString() });
      if (error) throw error;
      return;
    }
    localStorage.setItem("wc2026a3_answer", JSON.stringify(ans));
  },
};

function StepBadge({ n, label }) {
  return (
    <div style={{ textAlign: "center", marginBottom: 6 }}>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.15em", color: "#C8102E" }}>STEP {n}</span>
      <div style={{ fontSize: 19, fontWeight: 900, marginTop: 4 }}>{label}</div>
    </div>

function PlayerChip({ label, color, onClick, disabled, selected }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: "9px 14px", borderRadius: 12, cursor: disabled ? "not-allowed" : "pointer",
      fontSize: 13, fontWeight: selected ? 800 : 600,
      border: `1.5px solid ${selected ? color : color + "55"}`,
      background: selected ? `${color}38` : `${color}14`,
      color: selected ? "#fff" : "#dfe8f0",
      boxShadow: selected ? `0 0 0 2px ${color}40` : "none",
      transition: "all 0.15s", whiteSpace: "nowrap",
    }}
      onMouseEnter={(e) => { if (!disabled && !selected) { e.currentTarget.style.background = `${color}28`; e.currentTarget.style.borderColor = color; } }}
      onMouseLeave={(e) => { if (!selected) { e.currentTarget.style.background = `${color}14`; e.currentTarget.style.borderColor = `${color}55`; } }}
    >{label}</button>
  );
}
function Flag({ code, size = 22, style }) {
  return <img src={"https://flagcdn.com/h80/" + code + ".png"} alt="" aria-hidden="true"

function StatsPanel({ entries }) {
  const total = entries.length;
  if (total === 0) return <div style={{ color: "#667", fontSize: 13, padding: 16, textAlign: "center" }}>아직 제출 데이터가 없습니다.</div>;
  const outcomeDefs = [
    { key: "한국 승", color: "#C8102E" },
    { key: "무승부", color: "#7aa3cc" },
    { key: "남아공 승", color: "#007A4D" },
  ];
  const oc = {}; entries.forEach((e) => { oc[e.outcome] = (oc[e.outcome] || 0) + 1; });
  const sc = {}; entries.forEach((e) => { sc[e.scorer] = (sc[e.scorer] || 0) + 1; });
  const top = Object.entries(sc).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const scCount = {}; entries.forEach((e) => { const k = e.scoreKr + "-" + e.scoreSa; scCount[k] = (scCount[k] || 0) + 1; });
  const topScores = Object.entries(scCount).sort((a, b) => b[1] - a[1]).slice(0, 3);
  return (
    <div>
      <div style={{ fontSize: 12, color: "#7aa3cc", fontWeight: 700, letterSpacing: "0.08em", marginBottom: 12 }}>승 · 무 · 패 예측 비율</div>
      {outcomeDefs.map((o) => {
        const cnt = oc[o.key] || 0; const pct = Math.round((cnt / total) * 100);
        return (
          <div key={o.key} style={{ marginBottom: 11 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
              <span>{o.key}</span>
              <span style={{ fontWeight: 700, color: o.color }}>{cnt}표 ({pct}%)</span>
            </div>
            <div style={{ background: "#0a0e16", borderRadius: 6, height: 10, overflow: "hidden" }}>
              <div style={{ width: pct + "%", height: "100%", background: "linear-gradient(90deg, " + o.color + "88, " + o.color + ")", transition: "width 0.6s" }} />
            </div>
          </div>
        );
      })}
      <div style={{ fontSize: 12, color: "#7aa3cc", fontWeight: 700, letterSpacing: "0.08em", margin: "20px 0 12px" }}>⚽ 첫 득점 선수 득표율 TOP 5</div>
      {top.map(([name, cnt], i) => {
        const pct = Math.round((cnt / total) * 100);
        return (
          <div key={name} style={{ marginBottom: 11 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
              <span><span style={{ color: "#ffcf6b", fontWeight: 800 }}>{i + 1}.</span> {name}</span>
              <span style={{ fontWeight: 700, color: "#ffcf6b" }}>{cnt}표 ({pct}%)</span>
            </div>
            <div style={{ background: "#0a0e16", borderRadius: 6, height: 8, overflow: "hidden" }}>
              <div style={{ width: pct + "%", height: "100%", background: "linear-gradient(90deg, #ffcf6b88, #ffcf6b)", transition: "width 0.6s" }} />
            </div>
          </div>
        );
      })}

      <div style={{ fontSize: 12, color: "#7aa3cc", fontWeight: 700, letterSpacing: "0.08em", margin: "20px 0 12px" }}>📊 인기 스코어 예측 TOP 3</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
        {topScores.map(([sc2, cnt], i) => {
          const pct = Math.round((cnt / total) * 100);
          return (
            <div key={sc2} style={{ flex: "1 1 28%", minWidth: 92, background: "#0a0e16", border: "1px solid #1e2a3a", borderRadius: 12, padding: "12px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: i === 0 ? "#ffcf6b" : "#667", fontWeight: 700, marginBottom: 4 }}>{i + 1}위</div>
              <div style={{ fontSize: 20, fontWeight: 800 }}>{sc2.replace("-", " : ")}</div>
              <div style={{ fontSize: 11, color: "#8aa", marginTop: 4 }}>{cnt}명 ({pct}%)</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== PREDICT TAB ===================== */
function PredictTab({ closed }) {
  const [phase, setPhase] = useState("intro"); // intro | identity | score | scorer | done
  const [studentId, setStudentId] = useState("");
  const [studentName, setStudentName] = useState("");
  const [scoreKr, setScoreKr] = useState("");
  const [scoreSa, setScoreSa] = useState("");
  const [scorer, setScorer] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [statEntries, setStatEntries] = useState(null);

  const [adminOpen, setAdminOpen] = useState(false);
  const [pass, setPass] = useState("");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminError, setAdminError] = useState("");
  const [entries, setEntries] = useState([]);
  const [loadingAdmin, setLoadingAdmin] = useState(false);

  const startIdentity = () => { setError(""); setPhase("identity"); };

  const submitIdentity = async () => {
    setError("");
    if (closed) return setError("참여가 마감되었습니다.");
    const id = studentId.trim();
    const nm = studentName.trim();
    if (!id) return setError("학번을 입력해주세요.");
    if (!nm) return setError("이름을 입력해주세요.");
    const rc = rosterCheck(id, nm);
    if (!rc.ok) return setError(rc.reason);
    setBusy(true);
    try {
      const exists = await store.getEntry(id, nm);
      if (exists) { setBusy(false); return setError("이미 참여하셨습니다. 중복 참여 및 수정은 불가능합니다."); }
      setPhase("score");
    } catch (e) { setError("확인 중 오류: " + (e && e.message ? e.message : String(e))); }
    finally { setBusy(false); }
  };

  const submitScore = () => {
    setError("");
    if (scoreKr === "" || scoreSa === "") return setError("양 팀의 예상 스코어를 입력해주세요.");
    setPhase("scorer");
  };

  const outcomeFromScore = () => {
    const k = parseInt(scoreKr), s = parseInt(scoreSa);
    if (k > s) return "한국 승"; if (k < s) return "남아공 승"; return "무승부";
  };

  const loadStats = async () => { try { const all = await store.listEntries(); setStatEntries(all); } catch (e) {} };
  const submitFinal = async (chosenScorer) => {
    setError(""); setBusy(true);
    const entry = {
      studentId: studentId.trim(), name: studentName.trim().slice(0, 30),
      scoreKr: parseInt(scoreKr), scoreSa: parseInt(scoreSa),
      outcome: outcomeFromScore(), scorer: chosenScorer, submittedAt: new Date().toISOString(),
    };
    try {
      if (closed) { setBusy(false); setError("참여가 마감되었습니다."); setPhase("intro"); return; }
      const exists = await store.getEntry(entry.studentId, entry.name);
      if (exists) { setBusy(false); setError("이미 참여하셨습니다. 중복 참여는 불가능합니다."); setPhase("intro"); return; }
      await store.setEntry(entry);
      try { localStorage.setItem("wc2026a3_submitted", JSON.stringify({ studentId: entry.studentId, name: entry.name })); } catch (e) {}
      setScorer(chosenScorer); await loadStats(); setPhase("done");
    } catch (e) { setError("제출 중 오류: " + (e && e.message ? e.message : String(e))); }
    finally { setBusy(false); }
  };

  const resetAll = () => { setStudentId(""); setStudentName(""); setScoreKr(""); setScoreSa(""); setScorer(""); setError(""); setPhase("intro"); };

  const loadEntries = async () => {
    setLoadingAdmin(true);
    try { const out = await store.listEntries(); out.sort((a, b) => (a.studentId > b.studentId ? 1 : -1)); setEntries(out); }
    catch (e) { setEntries([]); }
    finally { setLoadingAdmin(false); }
  };
  useEffect(() => { if (adminAuthed) loadEntries(); }, [adminAuthed]);

  const checkPass = () => { if (pass === ADMIN_PASSCODE) { setAdminAuthed(true); setAdminError(""); } else setAdminError("비밀번호가 올바르지 않습니다."); };

  const downloadExcel = () => {
    const rows = entries.map((e, i) => ({
      "번호": i + 1, "학번": e.studentId, "이름": e.name,
      "한국 점수": e.scoreKr, "남아공 점수": e.scoreSa, "예측 결과": e.outcome,
      "첫 득점 선수": e.scorer, "제출 시각": new Date(e.submittedAt).toLocaleString("ko-KR"),
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{ wch: 6 }, { wch: 12 }, { wch: 14 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 16 }, { wch: 22 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "승부예측 결과");
    XLSX.writeFile(wb, `월드컵_승부예측_${new Date().toISOString().slice(0, 10)}.xlsx`);
  };

  return (
    <div>
      {!USE_SUPABASE && (
        <div style={{ background: "rgba(91,141,239,0.1)", border: "1px solid rgba(91,141,239,0.35)", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 12.5, color: "#9cc0ff" }}>

function StatsTab({ onGoPredict }) {
  const [verified, setVerified] = useState(null);
  const [entries, setEntries] = useState([]);
  const [sId, setSId] = useState("");
  const [sName, setSName] = useState("");
  const [vKr, setVKr] = useState("");
  const [vSa, setVSa] = useState("");
  const [vScorer, setVScorer] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [checking, setChecking] = useState(true);

  const loadEntries = async () => { try { setEntries(await store.listEntries()); } catch (e) { setEntries([]); } };
  const grant = async (entry) => {
    try { localStorage.setItem("wc2026a3_submitted", JSON.stringify({ studentId: entry.studentId, name: entry.name })); } catch (e) {}
    setVerified(entry); await loadEntries();
  };

  const verify = async () => {
    setError("");
    const sid = sId.trim(), nm = sName.trim();
    if (!sid || !nm) return setError("학번과 이름을 입력해주세요.");
    if (vKr === "" || vSa === "") return setError("예측한 스코어를 입력해주세요.");
    if (!vScorer) return setError("예측한 첫 득점 선수를 선택해주세요.");
    setBusy(true);
    try {
      const found = await store.getEntry(sid, nm);
      if (!found) setError("제출 내역을 찾을 수 없습니다. 학번·이름을 확인하거나 먼저 승부예측에 참여해 주세요.");
      else if (found.scoreKr === parseInt(vKr) && found.scoreSa === parseInt(vSa) && found.scorer === vScorer) await grant(found);
      else setError("입력한 예측 정보가 제출 내역과 일치하지 않습니다. 스코어와 첫 득점 선수를 다시 확인해 주세요.");
    } catch (e) { setError("조회 오류: " + (e && e.message ? e.message : String(e))); }
    finally { setBusy(false); }
  };

  useEffect(() => {
    let m = null;
    try { const v = localStorage.getItem("wc2026a3_submitted"); m = v ? JSON.parse(v) : null; } catch (e) {}
    if (m && m.studentId && m.name) {
      (async () => { try { const fnd = await store.getEntry(m.studentId, m.name); if (fnd) await grant(fnd); } catch (e) {} finally { setChecking(false); } })();
    } else setChecking(false);
  }, []);

  if (checking) return <div style={{ textAlign: "center", padding: 50, color: "#667" }}>불러오는 중...</div>;

  if (!verified) {
    return (
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: "30px 22px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 18 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>📊</div>
          <div style={{ fontSize: 17, fontWeight: 800 }}>통계 보기 — 본인 확인</div>
          <div style={{ fontSize: 13, color: "#9ab", marginTop: 6, lineHeight: 1.6 }}>내가 제출한 학번·이름과<br />예측 내용(스코어·첫 득점)을 그대로 입력하면 통계를 볼 수 있어요.</div>
        </div>
        <Label>학번</Label>
        <input value={sId} onChange={(e) => { setSId(e.target.value); setError(""); }} placeholder="예: 1101 (교사는 '교사')" maxLength={15} style={inputStyle} />
        <Label style={{ marginTop: 14 }}>이름</Label>
        <input value={sName} onChange={(e) => { setSName(e.target.value); setError(""); }} placeholder="예: 송우현" maxLength={30} style={inputStyle} />

        <Label style={{ marginTop: 18 }}>내가 예측한 스코어</Label>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
          <div style={{ textAlign: "center" }}><Flag code="kr" size={24} /><div><input value={vKr} onChange={(e) => { setVKr(e.target.value.replace(/[^0-9]/g, "").slice(0, 2)); setError(""); }} inputMode="numeric" placeholder="0" style={{ ...scoreBox("#C8102E"), width: 56, height: 56, fontSize: 26, marginTop: 4 }} /></div></div>
          <div style={{ fontSize: 22, color: "#445", fontWeight: 800, paddingTop: 18 }}>:</div>
          <div style={{ textAlign: "center" }}><Flag code="za" size={24} /><div><input value={vSa} onChange={(e) => { setVSa(e.target.value.replace(/[^0-9]/g, "").slice(0, 2)); setError(""); }} inputMode="numeric" placeholder="0" style={{ ...scoreBox("#007A4D"), width: 56, height: 56, fontSize: 26, marginTop: 4 }} /></div></div>
        </div>

        <Label style={{ marginTop: 18 }}>내가 예측한 첫 득점 선수</Label>
        {["KR", "SA"].map((tk) => {
          const sq = SQUADS[tk];
          return (
            <div key={tk} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 800, marginBottom: 6, color: sq.color }}><Flag code={sq.code} size={15} /> {sq.name}</div>
              {sq.positions.map((grp) => (
                <div key={grp.pos} style={{ marginBottom: 6 }}>
                  <div style={{ fontSize: 10, color: "#667", marginBottom: 4 }}>{grp.pos}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {grp.players.map((p) => { const val = sq.name + " " + p; return <PlayerChip key={p} label={p} color={sq.color} selected={vScorer === val} onClick={() => { setVScorer(val); setError(""); }} />; })}
                  </div>
                </div>
              ))}
            </div>
          );
        })}
        <div style={{ marginBottom: 6 }}>
          <div style={{ fontSize: 10, color: "#667", marginBottom: 4 }}>기타</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {SPECIAL_OPTIONS.map((p) => <PlayerChip key={p} label={p} color="#8a93a3" selected={vScorer === p} onClick={() => { setVScorer(p); setError(""); }} />)}
          </div>
        </div>

        {error && <div style={{ color: "#ff7088", fontSize: 13, marginTop: 12 }}>{error}</div>}
        <button onClick={verify} disabled={busy} style={{ width: "100%", marginTop: 16, padding: "14px", borderRadius: 11, border: "none", background: busy ? "#333" : "linear-gradient(135deg, #C8102E, #8b0020)", color: "#fff", fontSize: 15, fontWeight: 800, cursor: busy ? "not-allowed" : "pointer" }}>{busy ? "확인 중..." : "📊 내 통계 보기"}</button>
        <div style={{ textAlign: "center", marginTop: 14, fontSize: 12.5, color: "#8aa" }}>
          아직 참여 안 하셨나요? <button onClick={onGoPredict} style={{ background: "none", border: "none", color: "#7aa3cc", cursor: "pointer", fontWeight: 700, textDecoration: "underline", fontSize: 12.5 }}>참여하러 가기</button>
        </div>
      </div>
    );
  }

  const mine = verified;
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: "#9ab" }}>지금까지 <b style={{ color: "#fff", fontSize: 17 }}>{entries.length}</b>명 참여</div>
        <button onClick={loadEntries} style={{ padding: "7px 14px", borderRadius: 9, border: "1px solid #2a3a4f", background: "transparent", color: "#cde", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>🔄 새로고침</button>
      </div>
      <div style={{ background: "#0a1020", border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 16, fontSize: 13.5, lineHeight: 1.9 }}>
        <div style={{ fontSize: 12, color: "#7aa3cc", fontWeight: 700, marginBottom: 4 }}>내 예측 — {mine.name} ({mine.studentId})</div>
        <div>📊 스코어: <b>한국 {mine.scoreKr} : {mine.scoreSa} 남아공</b> · ⚽ 첫 득점: <b>{mine.scorer}</b></div>
      </div>
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 18, padding: "24px 22px" }}>
        <div style={{ fontSize: 16, fontWeight: 900, marginBottom: 18 }}>📊 학생들의 예측 통계</div>
        <StatsPanel entries={entries} />
      </div>
    </div>
  );
}
function AnswerTab() {
  const [answer, setAnswer] = useState(undefined); // undefined: 로딩, null: 미입력
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [adminOpen, setAdminOpen] = useState(false);
  const [pass, setPass] = useState("");
  const [authed, setAuthed] = useState(false);
  const [pErr, setPErr] = useState("");
  const [fKr, setFKr] = useState("");
  const [fSa, setFSa] = useState("");
  const [fScorer, setFScorer] = useState("");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const load = async () => {
    setLoading(true);
    try {
      const a = await store.getAnswer().catch(() => null);
      const all = await store.listEntries().catch(() => []);
      setAnswer(a || null);
      setEntries(all || []);
      if (a) { setFKr(String(a.scoreKr)); setFSa(String(a.scoreSa)); setFScorer(a.scorer); }
    } finally { setLoading(false); }
  };
  useEffect(() => { load(); }, []);

  const checkPass = () => { if (pass === ADMIN_PASSCODE) { setAuthed(true); setPErr(""); } else setPErr("비밀번호가 올바르지 않습니다."); };

  const save = async () => {
    setMsg("");
    if (fKr === "" || fSa === "") return setMsg("스코어를 입력해주세요.");
    if (!fScorer) return setMsg("첫 득점 선수를 선택해주세요.");
    setSaving(true);
    try {
      await store.setAnswer({ scoreKr: parseInt(fKr), scoreSa: parseInt(fSa), scorer: fScorer });
      await load();
      setMsg("저장되었습니다. 정답자 명단이 갱신되었습니다.");
    } catch (e) { setMsg("저장 오류: " + (e && e.message ? e.message : String(e))); }
    finally { setSaving(false); }
  };

  const total = entries.length;
  let scoreW = [], scorerW = [], bothW = [];
  if (answer) {
    scoreW = entries.filter((e) => e.scoreKr === answer.scoreKr && e.scoreSa === answer.scoreSa);
    scorerW = entries.filter((e) => e.scorer === answer.scorer);
    bothW = entries.filter((e) => e.scoreKr === answer.scoreKr && e.scoreSa === answer.scoreSa && e.scorer === answer.scorer);
  }

  const NameTags = ({ arr, color }) => (
    arr.length === 0 ? <div style={{ color: "#667", fontSize: 13 }}>해당 정답자가 없습니다.</div> :
    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
      {arr.map((e) => (
        <span key={e.studentId + e.name} style={{ fontSize: 12.5, fontWeight: 600, color: "#dfe8f0", background: color + "1a", border: "1px solid " + color + "55", borderRadius: 10, padding: "6px 11px", whiteSpace: "nowrap" }}>
          {e.name} <span style={{ color: "#8aa", fontWeight: 400 }}>{e.studentId}</span>
        </span>
      ))}
    </div>
  );

  return (
    <div>
      {loading ? (
        <div style={{ textAlign: "center", padding: 50, color: "#667" }}>불러오는 중...</div>
      ) : answer ? (
        <>
          {/* 공식 결과 */}
          <div style={{ background: "linear-gradient(135deg, #0d1b2a, #1a0a1a)", border: "1px solid " + C.border, borderRadius: 16, padding: "24px 20px", marginBottom: 18, textAlign: "center" }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#C8102E", marginBottom: 12 }}>공식 경기 결과</div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 18 }}>
              <div style={{ textAlign: "center" }}><Flag code="kr" size={34} /><div style={{ fontSize: 12, color: "#9ab", marginTop: 4 }}>대한민국</div></div>
              <div style={{ fontSize: 34, fontWeight: 900 }}>{answer.scoreKr} : {answer.scoreSa}</div>
              <div style={{ textAlign: "center" }}><Flag code="za" size={34} /><div style={{ fontSize: 12, color: "#9ab", marginTop: 4 }}>남아공</div></div>
            </div>
            <div style={{ marginTop: 14, fontSize: 14 }}>⚽ 첫 득점: <b style={{ color: "#ffcf6b" }}>{answer.scorer}</b></div>
          </div>

          {/* 정답자 명단 */}
          <Section title={"🏆 스코어 + 첫 득점 모두 정답 (" + bothW.length + "명)"} C={C}>
            <NameTags arr={bothW} color="#ffcf6b" />
          </Section>
          <Section title={"📊 정확한 스코어 정답 (" + scoreW.length + "명)"} C={C}>
            <NameTags arr={scoreW} color="#2ecc71" />
          </Section>
          <Section title={"⚽ 첫 득점 선수 정답 (" + scorerW.length + "명)"} C={C}>
            <NameTags arr={scorerW} color="#5b8def" />
          </Section>
          <div style={{ fontSize: 12, color: "#667", textAlign: "center", marginBottom: 14 }}>전체 참여 {total}명 기준 · 새로고침하면 최신 명단으로 갱신됩니다</div>
        </>
      ) : (
        <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: "40px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>⏳</div>
          <div style={{ fontSize: 17, fontWeight: 800, marginBottom: 6 }}>아직 경기 결과가 입력되지 않았습니다</div>
          <div style={{ fontSize: 13, color: "#9ab" }}>경기 종료 후 관리자가 결과를 입력하면 정답자 명단이 표시됩니다.</div>
        </div>
      )}

      {/* 관리자: 결과 입력/수정 */}
      <div style={{ textAlign: "center", marginTop: 8 }}>
        <button onClick={() => setAdminOpen(!adminOpen)} style={{ background: "none", border: "none", color: "#3a4a5f", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>🔒 관리자 · 경기 결과 입력/수정</button>
      </div>
      {adminOpen && (
        <div style={{ marginTop: 14, background: C.card, border: "1px solid " + C.border, borderRadius: 16, padding: 22 }}>
          {!authed ? (
            <div style={{ maxWidth: 320, margin: "0 auto" }}>
              <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} placeholder="관리자 비밀번호" onKeyDown={(e) => e.key === "Enter" && checkPass()} style={{ ...inputStyle, marginTop: 0 }} />
              {pErr && <div style={{ color: "#ff7088", fontSize: 12, marginTop: 8 }}>{pErr}</div>}
              <button onClick={checkPass} style={{ width: "100%", marginTop: 10, padding: "11px", borderRadius: 10, border: "1px solid #2a3a4f", background: "#162536", color: "#cde", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>확인</button>
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 14 }}>경기 결과 입력</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16, marginBottom: 18 }}>
                <div style={{ textAlign: "center" }}>
                  <Flag code="kr" size={26} />
                  <div><input value={fKr} onChange={(e) => { setFKr(e.target.value.replace(/[^0-9]/g, "").slice(0, 2)); setMsg(""); }} inputMode="numeric" placeholder="0" style={{ ...scoreBox("#C8102E"), width: 60, height: 60, fontSize: 28, marginTop: 6 }} /></div>
                </div>
                <div style={{ fontSize: 24, color: "#445", fontWeight: 800 }}>:</div>
                <div style={{ textAlign: "center" }}>
                  <Flag code="za" size={26} />
                  <div><input value={fSa} onChange={(e) => { setFSa(e.target.value.replace(/[^0-9]/g, "").slice(0, 2)); setMsg(""); }} inputMode="numeric" placeholder="0" style={{ ...scoreBox("#007A4D"), width: 60, height: 60, fontSize: 28, marginTop: 6 }} /></div>
                </div>
              </div>
              <div style={{ fontSize: 12, color: "#7aa3cc", fontWeight: 700, marginBottom: 8 }}>첫 득점 선수 선택</div>
              {["KR", "SA"].map((tk) => {
                const sq = SQUADS[tk];
                return (
                  <div key={tk} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, marginBottom: 8, color: sq.color }}><Flag code={sq.code} size={16} /> {sq.name}</div>
                    {sq.positions.map((grp) => (
                      <div key={grp.pos} style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 10, color: "#667", marginBottom: 5 }}>{grp.pos}</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {grp.players.map((p) => { const val = sq.name + " " + p; return <PlayerChip key={p} label={p} color={sq.color} selected={fScorer === val} onClick={() => { setFScorer(val); setMsg(""); }} />; })}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
              <div style={{ marginBottom: 6 }}>
                <div style={{ fontSize: 10, color: "#667", marginBottom: 5 }}>기타</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {SPECIAL_OPTIONS.map((p) => <PlayerChip key={p} label={p} color="#8a93a3" selected={fScorer === p} onClick={() => { setFScorer(p); setMsg(""); }} />)}
                </div>
              </div>
              {fScorer && <div style={{ fontSize: 13, color: "#aaa", marginTop: 10 }}>선택: <b style={{ color: "#ffcf6b" }}>{fScorer}</b></div>}
              {msg && <div style={{ fontSize: 13, color: msg.indexOf("저장되") === 0 ? "#2ecc71" : "#ff7088", marginTop: 10 }}>{msg}</div>}
              <button onClick={save} disabled={saving} style={{ width: "100%", marginTop: 16, padding: "14px", borderRadius: 10, border: "none", background: saving ? "#333" : "linear-gradient(135deg,#1d8a4f,#0f6b3a)", color: "#fff", fontSize: 15, fontWeight: 800, cursor: saving ? "not-allowed" : "pointer" }}>{saving ? "저장 중..." : "💾 결과 저장 & 자동 채점"}</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("info");
  const [count, setCount] = useState(null);
  useEffect(() => {
    let alive = true;
    const load = async () => { try { const all = await store.listEntries(); if (alive) setCount(all.length); } catch (e) {} };
    load();
    const id = setInterval(load, 15000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  const remain = DEADLINE - now;
  const closed = remain <= 0;
  const dd = Math.max(0, Math.floor(remain / 86400000));
  const hh = Math.max(0, Math.floor((remain % 86400000) / 3600000));
  const mm = Math.max(0, Math.floor((remain % 3600000) / 60000));
  const ss = Math.max(0, Math.floor((remain % 60000) / 1000));
  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: "#f0f4f8", fontFamily: "'Segoe UI', system-ui, sans-serif" }}>
      <div style={{ background: "linear-gradient(135deg, #0d1b2a 0%, #1a0a1a 50%, #0a1a0a 100%)", borderBottom: "1px solid #222" }}>
        <div style={{ background: "#C8102E", padding: "6px 0", overflow: "hidden" }}>
          <div style={{ display: "inline-block", whiteSpace: "nowrap", animation: "marquee 22s linear infinite", fontSize: 13, fontWeight: 600, letterSpacing: "0.05em" }}>
            🔴 LIVE · 2026 FIFA 북중미 월드컵 A조 3차전 &nbsp;|&nbsp; <Flag code="kr" size={12} /> 대한민국 vs <Flag code="za" size={12} /> 남아프리카공화국 &nbsp;|&nbsp; 📅 6월 25일 (한국시간 오전 10:00) &nbsp;|&nbsp; 📍 에스타디오 BBVA, 몬테레이 · 멕시코 &nbsp;|&nbsp; 🏫 전주신흥중학교 승부예측 이벤트 &nbsp;|&nbsp; 🔴 LIVE · 2026 FIFA 북중미 월드컵 A조 3차전 &nbsp;|&nbsp;
          </div>
        </div>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "28px 20px 22px" }}>
          <div style={{ textAlign: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#C8102E", textTransform: "uppercase" }}>2026 FIFA WORLD CUP · GROUP A · MATCHDAY 3</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 28 }}>
            <TeamHead team={TEAM_KR} />
            <div style={{ textAlign: "center", minWidth: 80 }}><div style={{ fontSize: 38, fontWeight: 900, color: "#444", fontStyle: "italic" }}>VS</div></div>
            <TeamHead team={TEAM_SA} />
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginTop: 16 }}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "rgba(255,255,255,0.05)", border: "1px solid #2a3a4f", borderRadius: 20, padding: "5px 14px", fontSize: 13 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#2ecc71", display: "inline-block", boxShadow: "0 0 0 3px rgba(46,204,113,0.2)", animation: "pulse 1.6s ease-in-out infinite" }} />
              <span style={{ color: "#9ab" }}>실시간 참여</span>
              <b style={{ color: "#fff", fontSize: 15 }}>{count === null ? "—" : count.toLocaleString()}</b>
              <span style={{ color: "#9ab" }}>명</span>
            </span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 7, background: closed ? "rgba(120,120,130,0.12)" : "rgba(230,168,23,0.12)", border: "1px solid " + (closed ? "#444" : "rgba(230,168,23,0.4)"), borderRadius: 20, padding: "5px 14px", fontSize: 13 }}>
              {closed ? (
                <b style={{ color: "#aaa" }}>⏱ 참여 마감</b>
              ) : (
                <>
                  <span style={{ color: "#9ab" }}>⏱ 참여 마감까지</span>
                  <b style={{ color: "#ffcf6b", fontSize: 14, fontVariantNumeric: "tabular-nums" }}>{dd}일 {hh}시간 {mm}분 {ss}초</b>
                </>
              )}
            </span>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 20px" }}>
        <div style={{ display: "flex", borderBottom: "1px solid #222", marginBottom: 26 }}>
          {[{ key: "info", label: "📋 경기정보" }, { key: "predict", label: "⚽ 승부예측" }, { key: "stats", label: "📊 통계" }, { key: "result", label: "🏆 정답자" }].map((t) => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{ flex: 1, background: "none", border: "none", borderBottom: tab === t.key ? "2px solid #C8102E" : "2px solid transparent", color: tab === t.key ? "#fff" : "#667", padding: "13px 4px", fontSize: 13, fontWeight: tab === t.key ? 700 : 400, cursor: "pointer", transition: "all 0.2s", whiteSpace: "nowrap" }}>{t.label}</button>
          ))}
        </div>
        {tab === "info" ? <InfoTab /> : tab === "predict" ? <PredictTab closed={closed} /> : tab === "stats" ? <StatsTab onGoPredict={() => setTab("predict")} /> : <AnswerTab />}
        <div style={{ textAlign: "center", padding: "24px 0 32px", borderTop: "1px solid #111", marginTop: 8 }}>
          <div style={{ fontSize: 12, color: "#333" }}>2026 FIFA World Cup · 전주신흥중학교 이벤트 · 예측은 참고용이며 실제 결과와 다를 수 있습니다</div>
        </div>
      </div>
    </div>
  );
}

try {
  var rootEl = document.getElementById("root");
  ReactDOM.createRoot(rootEl).render(<App />);
  rootEl.setAttribute("data-rendered", "1");
} catch (err) {
  if (typeof showFatal === "function") showFatal("앱 시작 중 오류", String(err && err.stack ? err.stack : err));
  else throw err;
}
</script>
</body>
</html>
